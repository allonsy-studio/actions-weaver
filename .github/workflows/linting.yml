name: Linting

on:
    pull_request:
        types: [opened, synchronize, reopened]

permissions:
    contents: read
    checks: write
    pull-requests: write

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Check out code
              uses: actions/checkout@v7
              with:
                  persist-credentials: false

            - name: Enable corepack
              run: corepack enable

            - name: Setup Node
              uses: actions/setup-node@v7
              with:
                  node-version-file: .nvmrc
                  cache: yarn

            - name: Install dependencies
              run: yarn install --immutable

            # Lint with the project's flat config (eslint.config.js) and surface
            # findings as inline PR review comments via reviewdog.
            - name: Run eslint via reviewdog
              uses: reviewdog/action-eslint@v1
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  reporter: github-pr-review
                  fail_level: error
                  eslint_flags: "."

    check-dist:
        runs-on: ubuntu-latest
        steps:
            - name: Check out code
              uses: actions/checkout@v7
              with:
                  persist-credentials: false

            - name: Enable corepack
              run: corepack enable

            - name: Setup Node
              uses: actions/setup-node@v7
              with:
                  node-version-file: .nvmrc
                  cache: yarn

            - name: Install dependencies
              run: yarn install --immutable

            # dist/ is committed so the action runs without an install step;
            # rebuild it here and fail if that leaves the tree dirty.
            - name: Build dist
              run: yarn build

            - name: Fail if dist is out of date
              run: |
                  if ! git diff --quiet -- dist; then
                      echo "::error::dist/ is out of date. Run 'yarn build' and commit the result."
                      git diff -- dist
                      exit 1
                  fi
