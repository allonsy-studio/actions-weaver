name: Release

on:
    push:
        branches: [main]

permissions:
    contents: write # push tags + create the GitHub release
    pull-requests: write # changesets opens the "Version Packages" PR
    id-token: write # OIDC token for npm trusted publishing

env:
  GH_TOKEN: ${{ github.token }}

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Check out code
              uses: actions/checkout@v7
              with:
                  # Full history + tags to detect prior releases, and persist the
                  # PAT so the publish step can push tags without re-auth.
                  fetch-depth: 0

            - name: Enable corepack
              run: corepack enable

            - name: Setup Node
              uses: actions/setup-node@v7
              with:
                  node-version-file: .nvmrc
                  cache: yarn

            - name: Install dependencies
              run: yarn install --immutable

            - name: Update npm for OIDC trusted publishing
              run: npm install --global npm@latest

            - name: Version
              id: changesets
              uses: changesets/action@v1
              with:
                  version: yarn changeset version
                  title: "chore(release): version packages"
                  commit: "chore(release): version packages"

            # Only build on the publish push (version PR merged), not on the push
            # that opens the version PR. dist/ is gitignored and never committed
            # to main; it exists only to be published to npm and attached to the
            # release tag below.
            - name: Build dist
              if: steps.changesets.outputs.hasChangesets == 'false'
              run: yarn build

            # Runs on the push that merges the version PR. The npm and tag checks
            # are independent so the step is a safe no-op on every other push.
            - name: Publish
              if: steps.changesets.outputs.hasChangesets == 'false'
              run: |
                  PKG="$(node -p "require('./package.json').name")"
                  VERSION="$(node -p "require('./package.json').version")"
                  TAG="v${VERSION}"
                  MAJOR="v${VERSION%%.*}"

                  # Publish to npm via OIDC (no token) unless already on the
                  # registry. The freshly built dist/ ships via the "files" field.
                  npm view "${PKG}@${VERSION}" version >/dev/null 2>&1 \
                      || npm publish --access public --provenance

                  # Tag the release and move the floating major tag (e.g. v1) onto
                  # it, unless this version is already tagged. dist/ is gitignored,
                  # so commit it onto a detached release commit and point the tags
                  # there; main is never pushed and stays free of build output, but
                  # `uses: …@vX` resolves a tag that carries the runnable bundle.
                  if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
                      echo "${TAG} already tagged."
                  else
                      git config user.name "github-actions[bot]"
                      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                      git add --force dist
                      git commit --message "build: bundle dist for ${TAG}"
                      git tag "${TAG}"
                      git tag -f "${MAJOR}" "${TAG}"
                      git push origin "${TAG}" "+refs/tags/${MAJOR}"
                      gh release create "${TAG}" --title "${TAG}" --generate-notes
                  fi
